<!-- Alerta de confirmación (se muestra al agregar o editar un producto) -->
<div *ngIf="mensaje" class="alert alert-success" role="alert">
  {{ mensaje }}
</div>

<!-- Tarjeta visual del formulario -->
<div class="card shadow-sm mb-4">
  <div class="card-body">

    <h5 class="card-title mb-3">
      {{ editing ? 'Editar producto' : 'Agregar nuevo producto' }}
    </h5>

    <!-- Formulario reactivo para agregar o editar productos -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      
      <!-- Campo: Nombre -->
      <div class="mb-3">
        <label class="form-label">Nombre del producto</label>
        <input type="text" formControlName="name" class="form-control" />
        <div *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="text-danger mt-1">
          El nombre es requerido.
        </div>
      </div>

      <!-- Campo: Precio -->
      <div class="mb-3">
        <label class="form-label">Precio</label>
        <input type="number" formControlName="price" class="form-control" />
        <div *ngIf="form.get('price')?.invalid && form.get('price')?.touched" class="text-danger mt-1">
          <span *ngIf="form.get('price')?.errors?.['required']">El precio es requerido.</span>
          <span *ngIf="form.get('price')?.errors?.['min']">Debe ser mayor a 0.</span>
        </div>
      </div>

      <!-- Campo: Correo del proveedor -->
      <div class="mb-3">
        <label class="form-label">Correo del proveedor</label>
        <input type="email" formControlName="email" class="form-control" />
        <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched" class="text-danger mt-1">
          <span *ngIf="form.get('email')?.errors?.['required']">El correo es requerido.</span>
          <span *ngIf="form.get('email')?.errors?.['pattern']">Formato de correo inválido.</span>
        </div>
      </div>

      <!-- Campo: Fecha de ingreso -->
      <div class="mb-3">
        <label class="form-label">Fecha de ingreso</label>
        <input type="date" formControlName="date" class="form-control" />
        <div *ngIf="form.get('date')?.invalid && form.get('date')?.touched" class="text-danger mt-1">
          La fecha es requerida.
        </div>
      </div>

      <!-- Botón para enviar el formulario -->
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
        {{ editing ? 'Editar producto' : 'Agregar producto' }}
      </button>

    </form>
  </div>
</div>
